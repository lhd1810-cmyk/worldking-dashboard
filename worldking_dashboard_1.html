<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월드킹 계양점 — 매출 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a56db;--blue-light:#e8f0fe;--green:#16a34a;--green-light:#dcfce7;--amber:#d97706;--amber-light:#fef3c7;--red:#dc2626;--red-light:#fee2e2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4ff;min-height:100vh;color:var(--gray-800);}
.container{max-width:800px;margin:0 auto;padding:2rem 1rem;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.dot{width:12px;height:12px;border-radius:50%;background:var(--blue);}
.header h1{font-size:22px;font-weight:700;}
.hbadge{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;}
.sec{margin-bottom:1.5rem;}
.sec-title{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--gray-200);padding:1.25rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:600px){.g3,.g4{grid-template-columns:repeat(2,1fr);}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;color:var(--gray-600);font-weight:500;}
.field input,.field select{border:1px solid var(--gray-200);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .2s;width:100%;}
.field input:focus,.field select:focus{border-color:var(--blue);background:#fff;}
.divider{border:none;border-top:1px solid var(--gray-100);margin:1rem 0;}
.metric{background:var(--gray-50);border-radius:8px;padding:.875rem 1rem;border:1px solid var(--gray-100);}
.metric .ml{font-size:11px;color:var(--gray-400);font-weight:500;margin-bottom:5px;}
.metric .mv{font-size:20px;font-weight:700;color:var(--gray-800);}
.metric .ms{font-size:11px;margin-top:3px;color:var(--gray-400);}
.prog-bg{background:var(--gray-100);border-radius:6px;height:10px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s ease;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--gray-400);}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th{font-size:11px;font-weight:700;color:var(--gray-400);text-align:left;padding:8px;border-bottom:1px solid var(--gray-100);}
td{padding:10px 8px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.bs{background:var(--green-light);color:var(--green);}
.bw{background:var(--amber-light);color:var(--amber);}
.bd{background:var(--red-light);color:var(--red);}
.alert{border-radius:10px;padding:.875rem 1rem;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.as{background:var(--green-light);}
.aw{background:var(--amber-light);}
.ad{background:var(--red-light);}
.aicon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;color:#fff;}
.as .aicon{background:var(--green);}
.aw .aicon{background:var(--amber);}
.ad .aicon{background:var(--red);}
.atitle{font-size:13px;font-weight:700;margin-bottom:3px;}
.as .atitle{color:var(--green);}
.aw .atitle{color:var(--amber);}
.ad .atitle{color:var(--red);}
.abody{font-size:12px;line-height:1.6;color:var(--gray-600);}
.empty{color:var(--gray-400);text-align:center;padding:1.5rem;font-size:13px;}
footer{text-align:center;font-size:11px;color:var(--gray-400);margin-top:2rem;padding-bottom:2rem;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="dot"></div>
    <h1>월드킹 계양점</h1>
    <span class="hbadge">매출 대시보드</span>
  </div>
  <div class="sec">
    <div class="sec-title">목표 설정</div>
    <div class="card">
      <div class="g3" style="margin-bottom:14px;">
        <div class="field"><label>기준 월</label><select id="month"></select></div>
        <div class="field"><label>월 목표 매출 (원)</label><input type="number" id="goal" placeholder="예: 30000000" oninput="calc()"/></div>
        <div class="field"><label>총 영업일 수</label><input type="number" id="bizdays" placeholder="예: 26" oninput="calc()"/></div>
      </div>
      <hr class="divider">
      <div class="g4">
        <div class="field"><label>현재 누적 매출 (원)</label><input type="number" id="actual" placeholder="0" oninput="calc()"/></div>
        <div class="field"><label>경과 영업일</label><input type="number" id="elapsed" placeholder="0" oninput="calc()"/></div>
        <div class="field"><label>주말 매출 비중 (%)</label><input type="number" id="wratio" placeholder="예: 60" oninput="calc()"/></div>
        <div class="field"><label>잔여 주말일 수</label><input type="number" id="wdays" placeholder="예: 6" oninput="calc()"/></div>
      </div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">진도율 현황</div>
    <div class="g4" style="margin-bottom:12px;">
      <div class="metric"><div class="ml">목표 진도율</div><div class="mv" id="trate">—</div><div class="ms">경과일 기준</div></div>
      <div class="metric"><div class="ml">실제 진도율</div><div class="mv" id="arate">—</div><div class="ms" id="gap-text">—</div></div>
      <div class="metric"><div class="ml">잔여 목표액</div><div class="mv" id="remain">—</div><div class="ms">달성 필요</div></div>
      <div class="metric"><div class="ml">일 평균 필요액</div><div class="mv" id="dneed">—</div><div class="ms">잔여일 기준</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-400);margin-bottom:5px;">
        <span>달성률</span><span id="plabel" style="font-weight:700;color:var(--gray-800);">0%</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="pbar" style="width:0%;background:var(--blue);"></div></div>
      <div class="prog-labels"><span>0%</span><span>목표 진도율 <strong id="ptlabel">—</strong></span><span>100%</span></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">수치 표</div>
    <div class="card" style="overflow-x:auto;">
      <table>
        <thead><tr><th style="width:26%;">항목</th><th style="width:20%;">목표</th><th style="width:20%;">실적</th><th style="width:14%;">달성률</th><th style="width:20%;">상태</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" class="empty">숫자를 입력하면 표가 채워집니다</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">관리자 액션 가이드</div>
    <div id="guide"><p class="empty" style="background:#fff;border-radius:var(--radius);padding:1.5rem;">목표와 실적을 입력하면 가이드가 생성됩니다.</p></div>
  </div>
  <footer>월드킹 계양점 매출 대시보드 · 관리자 전용</footer>
</div>
<script>
const sel=document.getElementById('month');
const now=new Date();
for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const o=document.createElement('option');o.textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월`;sel.appendChild(o);}
function fw(n){return Math.round(n).toLocaleString('ko-KR')+'원';}
function fm(n){return Math.round(n/10000).toLocaleString('ko-KR')+'만원';}
function sb(r){if(r>=100)return '<span class="badge bs">달성</span>';if(r>=90)return '<span class="badge bw">근접</span>';if(r>=70)return '<span class="badge bw">주의</span>';return '<span class="badge bd">미달</span>';}
function calc(){
  const goal=parseInt(document.getElementById('goal').value)||0;
  const actual=parseInt(document.getElementById('actual').value)||0;
  const biz=parseInt(document.getElementById('bizdays').value)||0;
  const elapsed=parseInt(document.getElementById('elapsed').value)||0;
  const wratio=parseFloat(document.getElementById('wratio').value)||60;
  const wdays=parseInt(document.getElementById('wdays').value)||0;
  if(!goal||!biz||!elapsed){document.getElementById('guide').innerHTML='<div class="alert aw"><div class="aicon">▲</div><div><div class="atitle">입력 필요</div><div class="abody">목표 매출, 영업일 수, 경과일을 모두 입력해주세요.</div></div></div>';return;}
  const rem=biz-elapsed;const tr=Math.round(elapsed/biz*100);const ar=goal>0?Math.round(actual/goal*100):0;const gap=ar-tr;const remAmt=Math.max(goal-actual,0);const dn=rem>0?remAmt/rem:0;const da=elapsed>0?actual/elapsed:0;
  document.getElementById('trate').textContent=tr+'%';document.getElementById('arate').textContent=ar+'%';document.getElementById('remain').textContent=fm(remAmt);document.getElementById('dneed').textContent=fm(dn)+'/일';
  const gt=document.getElementById('gap-text');if(gap>=0){gt.textContent='+'+gap+'%p 앞서는 중';gt.style.color='var(--green)';}else{gt.textContent=gap+'%p 뒤처진 중';gt.style.color='var(--red)';}
  const pb=document.getElementById('pbar');pb.style.width=Math.min(ar,100)+'%';pb.style.background=gap>=0?'var(--green)':gap>=-10?'var(--amber)':'var(--red)';
  document.getElementById('plabel').textContent=ar+'%';document.getElementById('ptlabel').textContent=tr+'%';
  const wg=goal*(wratio/100),wa=actual*(wratio/100);const dg=goal*((100-wratio)/100),da2=actual*((100-wratio)/100);
  const rows=[['총 매출',fw(goal),fw(actual),ar+'%',sb(ar)],['일평균 실적',fm(da)+'/일',fm(dn)+'/일 필요','—',''],['주말 매출 (추정)',fm(wg),fm(wa),Math.round(wa/wg*100)+'%',sb(Math.round(wa/wg*100))],['평일 매출 (추정)',fm(dg),fm(da2),Math.round(da2/dg*100)+'%',sb(Math.round(da2/dg*100))],['잔여 필요액','—',fm(remAmt),'—',rem>0?rem+'일 남음':'마감']];
  document.getElementById('tbody').innerHTML=rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' style="color:var(--gray-400);font-weight:500;"':''}>${c}</td>`).join('')}</tr>`).join('');
  const gs=[];function ag(t,title,body){gs.push({t,title,body});}
  if(ar>=100){ag('success','목표 달성!','이번 달 목표를 달성했습니다. 다음 달 목표 상향을 검토하세요.');}
  else if(gap<=-20){ag('danger','긴급 — 대폭 뒤처진 상태',`진도율이 목표보다 ${Math.abs(gap)}%p 낮습니다.`);if(wdays>0){const wn=remAmt*(wratio/100)/wdays;ag('danger','주말 집중 공략 필요',`잔여 주말 ${wdays}일에 일평균 ${Math.round(wn/10000).toLocaleString()}만원 이상 달성해야 합니다.`);}ag('warning','평일 — 어린이집·단체 유치','어린이집 단체 방문 및 생일파티 패키지 단기 할인을 평일에 집중 운영하세요.');}
  else if(gap<=-10){ag('warning','주의 — 진도율 뒤처짐',`목표 대비 ${Math.abs(gap)}%p 부족합니다.`);if(wdays>0)ag('warning','주말 이벤트 강화 권장',`잔여 주말 ${wdays}일을 활용해 SNS 이벤트·쿠폰으로 방문객을 늘리세요.`);ag('warning','어린이집 매출 점검','계약 입금 확인 및 추가 계약 기관을 발굴하세요.');}
  else if(gap<0){ag('warning','소폭 뒤처짐 — 유지 관리',`만회 가능 범위입니다. 일평균 ${fm(dn)}을 유지하세요.`);}
  else{ag('success','순항 중',`목표 진도율을 ${gap}%p 앞서고 있습니다.`);}
  if(rem<=5&&ar<90)ag('danger',`마감 ${rem}일 전 — 마지막 스퍼트`,'카카오 채널 긴급 프로모션으로 잔여 목표를 채우세요.');
  const mk={success:'✓',warning:'▲',danger:'!'};
  document.getElementById('guide').innerHTML=gs.map(g=>`<div class="alert a${g.t[0]}"><div class="aicon">${mk[g.t]}</div><div><div class="atitle">${g.title}</div><div class="abody">${g.body}</div></div></div>`).join('');
}
</script>
</body>
</html>
